<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" />
    </ion-buttons>
    <ion-title>{{ selectedApod?.title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <img
    (click)="showFull()"
    (keyup.enter)="showFull()"
    [alt]="$safeNavigationMigration(selectedApod?.title)"
    [src]="imageURL()"
    tabindex="0"
  />
  <div class="credit">
    {{ selectedApod?.credit }}
  </div>
  <div [innerHTML]="$safeNavigationMigration(selectedApod?.explanation)" class="explanation"></div>
</ion-content>
